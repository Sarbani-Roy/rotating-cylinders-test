name: DuMux-CI
on:
  push:

  pull_request:
    branches: [ main ]

  workflow_dispatch:

env:
  CACHE_NUMBER: 1  
  
jobs:
  dumux-tests:
    runs-on: ubuntu-latest

    steps:
      - name: checkout repo content
        uses: actions/checkout@v4

      - name: Setup Mambaforge
        uses: conda-incubator/setup-miniconda@v3
        with:
            miniforge-version: latest
            activate-environment: model-validation
            use-mamba: true
            conda-remove-defaults: true

      - name: Set strict channel priority
        run: conda config --set channel_priority strict
        
      - name: Setup Apptainer
        uses: eWaterCycle/setup-apptainer@v2
        with:
          apptainer-version: 1.4.5

      - name: Update environment
        run: mamba env update -n model-validation -f $GITHUB_WORKSPACE/dumux/environment_benchmarks.yml

      - name: Simulate rotating cylinders using dumux & validate convergence
        shell: bash -l {0}
        run: |
          cd $GITHUB_WORKSPACE/dumux
          python3 run_benchmark.py \
            --benchmark-file benchmark.json \
            --benchmark-zip rocrate_dumux.zip \
            --result-path ./results

      - name: Generate convergence plots
        shell: bash -l {0}
        run: |
          # plot_convergence.py derives its root dir from its own file location
          # (Path(__file__).resolve().parent) and scans that dir's immediate
          # subdirectories for a results/ folder. It must sit next to dumux/
          # (repo root), not inside scripts/, so we copy it there first.
          cp $GITHUB_WORKSPACE/scripts/plot_convergence.py $GITHUB_WORKSPACE/plot_convergence.py
          cd $GITHUB_WORKSPACE
          python3 plot_convergence.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: ${{ github.workspace }}/dumux/results
          retention-days: 5